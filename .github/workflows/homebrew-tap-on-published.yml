name: Homebrew tap (on published release)

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  homebrew-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for packaging template + script)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 1

      - name: Update homebrew-tap
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping tap update"
            exit 0
          fi
          chmod +x scripts/update-homebrew-tap.sh
          scripts/update-homebrew-tap.sh "${{ github.event.release.tag_name }}"
